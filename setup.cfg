[flake8]
# O subject exige aderência ao standard flake8.
# Excluímos as pastas que não contêm código relevante para evitar falsos positivos.
exclude = .git, __pycache__, venv, .mypy_cache, .vscode
max-line-length = 79

[mypy]
# Requisito do subject: Python 3.10 ou superior
python_version = 3.10

# Flags exigidas para a regra "lint" obrigatória
warn_return_any = True
warn_unused_ignores = True
ignore_missing_imports = True
disallow_untyped_defs = True
check_untyped_defs = True

# Ignorar as pastas de ambiente e cache
exclude = (?x)(
    ^venv/
    | ^\.mypy_cache/
    | ^__pycache__/
  )